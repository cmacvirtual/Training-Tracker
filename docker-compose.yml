services:
  backend:
    build: ./backend
    container_name: training-toc-api
    ports:
      - "8000:8000"
    volumes:
      - toc_data:/app/data
    environment:
      - TOC_SECRET_KEY=change-this-secret-before-network-use
      - TOC_DATABASE_URL=sqlite:////app/data/toc.db
      - TOC_RESET_DEFAULT_ADMIN=true
      - TOC_ENABLE_BOOTSTRAP_RESET=true
  frontend:
    build: ./frontend
    container_name: training-toc-web
    ports:
      - "3000:80"
    depends_on:
      - backend
volumes:
  toc_data:
